<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAHM SUPPORT | مساعد الاستمارة الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --bg: #05060a; --card-bg: rgba(10, 12, 18, 0.95); }
        body.theme-toxic { --neon: #39ff14; --gold: #ccff00; --bg: #020500; }
        body.theme-ember { --neon: #ff3131; --gold: #ff9100; --bg: #050000; }
        
        body { 
            background: var(--bg); color: white; font-family: 'Cairo', sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; transition: 0.5s;
        }
        
        #rainCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .main-card { 
            background: var(--card-bg); padding: 25px; border-radius: 25px; 
            width: 90%; max-width: 420px; border: 1px solid var(--neon); 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); text-align: center; 
            backdrop-filter: blur(10px); position: relative;
        }

        h1 { font-size: 28px; font-weight: 900; margin: 0; color: white; }
        h1 span { color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        .sub-title { color: var(--neon); font-size: 10px; letter-spacing: 2px; margin-bottom: 20px; opacity: 0.8; }

        .field { text-align: right; margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #8899a6; margin-bottom: 4px; font-weight: bold; }
        input, textarea { 
            width: 100%; padding: 12px; background: #111821; border: 1px solid #2f3336; 
            border-radius: 10px; color: white; outline: none; box-sizing: border-box; font-family: 'Cairo';
        }
        
        .btn-auto { 
            background: linear-gradient(45deg, var(--neon), #3a7bd5); color: white; 
            padding: 15px; border: none; border-radius: 15px; cursor: pointer; 
            width: 100%; font-weight: 900; font-size: 16px; margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3); transition: 0.3s;
        }
        .btn-auto:hover { transform: translateY(-3px); box-shadow: 0 8px 20px var(--neon); }

        .theme-btn { background: transparent; color: var(--neon); border: 1px solid var(--neon); padding: 5px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; margin-bottom: 15px; }
        .rights { margin-top: 20px; font-size: 10px; color: #55acee; }
    </style>
</head>
<body>

    <canvas id="rainCanvas"></canvas>

    <div class="main-card">
        <button class="theme-btn" onclick="nextTheme()" id="tBtn">ثيم: النيون 🎨</button>
        
        <h1>SHAHM <span>AUTO</span></h1>
        <div class="sub-title">TELEGRAM SUPPORT BYPASS</div>

        <div class="field">
            <label>الكليشة (وصف المشكلة)</label>
            <textarea id="desc" rows="4" placeholder="اكتب الكليشة هنا..."></textarea>
        </div>

        <div class="field">
            <label>بريدك الإلكتروني</label>
            <input type="email" id="email" placeholder="example@gmail.com">
        </div>

        <div class="field">
            <label>رقم الهاتف (مع مفتاح الدولة)</label>
            <input type="text" id="phone" placeholder="+9647700000000">
        </div>

        <button class="btn-auto" onclick="openSupport()">تعبئة وإرسال تلقائي 🚀</button>
        
        <div class="rights">حقوق النظام محفوظة لـ SHAHM ZONE</div>
    </div>

    <script>
        // نظام المطر التفاعلي
        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, raindrops = [];

        function initRain() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            raindrops = [];
            for (let i = 0; i < 70; i++) raindrops.push({ x: Math.random() * width, y: Math.random() * height, len: Math.random() * 20 + 10, speed: Math.random() * 5 + 4 });
        }

        function drawRain() {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--neon').trim();
            ctx.lineWidth = 1;
            raindrops.forEach(p => {
                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y + p.len); ctx.stroke();
                p.y += p.speed;
                if (p.y > height) { p.y = -p.len; p.x = Math.random() * width; }
            });
            requestAnimationFrame(drawRain);
        }

        // نظام الثيمات
        const themes = [{c:'default', n:'النيون'}, {c:'theme-toxic', n:'الهكر'}, {c:'theme-ember', n:'الجمرة'}];
        let curr = 0;
        function nextTheme() {
            document.body.classList.remove(themes[curr].c);
            curr = (curr + 1) % themes.length;
            if(themes[curr].c !== 'default') document.body.classList.add(themes[curr].c);
            document.getElementById('tBtn').innerText = `ثيم: ${themes[curr].n} 🎨`;
        }

        // السحر: التعبئة التلقائية
        function openSupport() {
            const desc = document.getElementById('desc').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;

            // الرابط الذكي الذي يملأ الحقول تلقائياً في موقع تليجرام
            const url = `https://telegram.org/support?set_text=${encodeURIComponent(desc)}&set_email=${encodeURIComponent(email)}&set_phone=${encodeURIComponent(phone)}`;
            
            window.open(url, '_blank');
        }

        // حفظ البيانات تلقائياً
        const ids = ['desc', 'email', 'phone'];
        window.onload = () => {
            initRain(); drawRain();
            ids.forEach(id => {
                document.getElementById(id).value = localStorage.getItem('sh_'+id) || "";
                document.getElementById(id).oninput = () => localStorage.setItem('sh_'+id, document.getElementById(id).value);
            });
        };
        window.onresize = initRain;
    </script>
</body>
</html>
